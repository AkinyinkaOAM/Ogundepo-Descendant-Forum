<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyHistory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.6;
        }

        .bg-body-tertiary {
            background-color: #0A509B !important;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: #0A509B;
            color: white;
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        nav ul {
            list-style: none;
            display: flex;
            padding: 10px;
            margin: 0;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

         /* MARQUEE */
        .marquee {
            margin-top: 60px;
            background: #69BEEB;
            color: #000;
            padding: 10px;
            overflow: hidden;
            white-space: nowrap;
        }
        /* MEDIA QUERIES FOR NAV */

/* Small devices (phones, less than 576px) */
@media (max-width: 575.98px) {
  nav ul {
    flex-direction: column;
    align-items: center;
  }

  nav ul li {
    margin: 8px 0;
  }

  nav ul li a {
    font-size: 14px;
  }
}

/* Medium devices (tablets, 576px to 767px) */
@media (min-width: 576px) and (max-width: 767.98px) {
  nav ul {
    flex-wrap: wrap;
    justify-content: space-around;
  }

  nav ul li a {
    font-size: 16px;
  }
}

/* Large devices (desktops, 768px and up) */
@media (min-width: 768px) {
  nav ul {
    flex-direction: row;
    justify-content: center;
  }

  nav ul li a {
    font-size: 18px;
  }
}


        .marquee span {
            display: inline-block;
            animation: scroll 15s linear infinite;
        }
         @keyframes scroll {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(-100%);
            }
        }
        
         /* FLOATING LOGO */
        .floating-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            color: blue;
            font-weight: bold;
            animation: spin 6s linear infinite;
            z-index: 50;
        }

         @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }


        h1 {
            text-align: center;
            margin-top: 80px;
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <nav>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="./familyMemebers.html">Family Members</a></li>
            <li><a href="./familyTree.html">Family Tree</a></li>
            <li><a href="./familyHistory.html">Family History</a></li>
            <li><a href="./gallery.html">Gallery</a></li>
            <li><a href="./contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- MARQUEE -->
    <div class="marquee">
        <span>Welcome to The Ogundepo's Family Official Website — Unity • Heritage • Legacy</span>
    </div>

    <br>
    <div class="floating-logo"><img src="../images/Logo.png" width="80px" alt=""></div>
    <h1>Family History</h1>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</html>
